<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kasko Teklifi — Sigortacın.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8F8F8;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Hero */
    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .badge {
      display: inline-block;
      background-color: #C0392B;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 14px;
      border-radius: 100px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      color: #1A1A1A;
    }

    .hero p {
      font-size: 16px;
      font-weight: 400;
      color: #666666;
      line-height: 1.5;
    }

    /* Card */
    .card {
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E0E0E0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .card-accent {
      height: 4px;
      background-color: #C0392B;
    }

    .card-body {
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 4px;
    }

    .shield-icon {
      width: 28px;
      height: 28px;
      color: #C0392B;
      flex-shrink: 0;
    }

    .card-header span {
      font-size: 14px;
      font-weight: 600;
      color: #C0392B;
      letter-spacing: 0.02em;
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      color: #1A1A1A;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #1A1A1A;
      background: #FFFFFF;
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s ease;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #BBBBBB;
    }

    input:focus {
      border-color: #C0392B;
    }

    input.error {
      border-color: #C0392B;
      background-color: #FFF8F8;
    }

    .error-msg {
      font-size: 12px;
      font-weight: 500;
      color: #C0392B;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .kvkk {
      font-size: 11px;
      color: #999999;
      line-height: 1.5;
      text-align: center;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background-color: #C0392B;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, opacity 0.15s ease;
      letter-spacing: 0.01em;
    }

    button[type="submit"]:hover {
      background-color: #A93226;
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Success state */
    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 12px 0 4px;
    }

    .success-state.visible {
      display: flex;
    }

    .success-icon {
      width: 52px;
      height: 52px;
      background-color: #C0392B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-icon svg {
      width: 26px;
      height: 26px;
      color: #fff;
    }

    .success-state h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1A1A1A;
    }

    .success-state p {
      font-size: 14px;
      color: #666666;
      line-height: 1.5;
    }

    /* Trust signals */
    .trust {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666666;
    }

    .trust-item svg {
      width: 16px;
      height: 16px;
      color: #C0392B;
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      font-size: 12px;
      color: #BBBBBB;
      text-align: center;
    }

    @media (max-width: 400px) {
      .hero h1 {
        font-size: 24px;
      }

      .card-body {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="hero">
      <span class="badge">Ücretsiz · Taahhütsüz</span>
      <h1>Kaza Anında Kaskodan Tam Ödeme Alabilmek İçin 5 Kritik Adımı Ücretsiz İndir</h1>
    </div>

    <div class="card">
      <div class="card-accent"></div>
      <div class="card-body">

        <div class="card-header">
          <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Güvenli Form</span>
        </div>

        <form id="leadForm" novalidate>
          <div style="display:flex;flex-direction:column;gap:20px;">

            <div class="form-group">
              <label for="fullName">Ad Soyad</label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Ahmet Yılmaz"
                autocomplete="name"
              />
              <span class="error-msg" id="fullNameError">Bu alan zorunludur</span>
            </div>

            <div class="form-group">
              <label for="phone">Telefon Numarası</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="0532 123 45 67"
                autocomplete="tel"
                inputmode="numeric"
                maxlength="14"
              />
              <span class="error-msg" id="phoneError">Bu alan zorunludur</span>
            </div>

            <button type="submit" id="submitBtn">Ücretsiz Listeyi İndir</button>

            <p id="submitError" style="display:none;font-size:13px;color:#C0392B;text-align:center;font-weight:500;">Bir hata oluştu, lütfen tekrar deneyin.</p>

          </div>
        </form>

        <div class="success-state" id="successState">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <h3>PDF başarıyla indirildi!</h3>
        </div>

      </div>
    </div>

    <footer>© 2025 Sigortacın.com</footer>

  </div>

  <script>
    const form = document.getElementById('leadForm');
    const submitBtn = document.getElementById('submitBtn');
    const successState = document.getElementById('successState');
    const phoneInput = document.getElementById('phone');
    const fullNameInput = document.getElementById('fullName');

    // Phone formatting
    phoneInput.addEventListener('input', function () {
      let digits = this.value.replace(/\D/g, '');

      if (digits.length > 11) digits = digits.slice(0, 11);

      let formatted = '';
      if (digits.length <= 4) {
        formatted = digits;
      } else if (digits.length <= 7) {
        formatted = digits.slice(0, 4) + ' ' + digits.slice(4);
      } else if (digits.length <= 9) {
        formatted = digits.slice(0, 4) + ' ' + digits.slice(4, 7) + ' ' + digits.slice(7);
      } else {
        formatted = digits.slice(0, 4) + ' ' + digits.slice(4, 7) + ' ' + digits.slice(7, 9) + ' ' + digits.slice(9);
      }

      this.value = formatted;
    });

    // Clear error on input
    fullNameInput.addEventListener('input', function () {
      clearError(this, 'fullNameError');
    });

    phoneInput.addEventListener('input', function () {
      clearError(this, 'phoneError');
    });

    function clearError(input, errorId) {
      input.classList.remove('error');
      document.getElementById(errorId).classList.remove('visible');
    }

    function showError(input, errorId) {
      input.classList.add('error');
      document.getElementById(errorId).classList.add('visible');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const name = fullNameInput.value.trim();
      const phone = phoneInput.value.replace(/\D/g, '');

      let valid = true;

      if (!name) {
        showError(fullNameInput, 'fullNameError');
        valid = false;
      } else {
        clearError(fullNameInput, 'fullNameError');
      }

      if (!phone || phone.length < 10) {
        showError(phoneInput, 'phoneError');
        valid = false;
      } else {
        clearError(phoneInput, 'phoneError');
      }

      if (!valid) return;

      const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLGAk836jD6qjWY8bLye8GGky3lEitfE1otr5OZ3yfeQ639cjw6YSLhfO8EAV_aTxLXA/exec';

      submitBtn.disabled = true;
      submitBtn.textContent = 'Gönderiliyor...';
      document.getElementById('submitError').style.display = 'none';

      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, phone: phoneInput.value.trim() })
      })
        .then(function () {
          const a = document.createElement('a');
          a.href = 'kasko_kaza_checklist.pdf';
          a.download = 'kasko_kaza_checklist.pdf';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          form.style.display = 'none';
          successState.classList.add('visible');
        })
        .catch(function () {
          document.getElementById('submitError').style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Ücretsiz Listeyi İndir';
        });
    });
  </script>

</body>
</html>
